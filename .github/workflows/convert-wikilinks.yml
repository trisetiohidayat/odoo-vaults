name: Convert Wikilinks to Markdown Links

on:
  push:
    branches:
      - main
    paths:
      - 'odoo-*/**'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Convert wikilinks and fix case in odoo-* folders
        run: |
          python << 'EOF'
          import re
          import os

          def to_path(text):
              """Convert text to path: replace spaces with dashes, preserve case"""
              return text.replace(" ", "-")

          def convert_content(content):
              # Fix markdown links with lowercase paths: [Text](lowercase/path.md)
              # Convert back to proper case using link text
              # [Modules/Sale](modules/sale.md) → [Modules/Sale](Modules/Sale.md)
              # [Page|Alias](lowercase/page.md) → [Alias](Page.md)
              def fix_md_link(m):
                  full_match = m.group(0)
                  text = m.group(1)
                  url = m.group(2)
                  # Extract the original path from link text (replace spaces with dashes)
                  original_path = to_path(text)
                  # Check if URL is lowercase version of the path
                  if url.lower() != original_path.lower():
                      return full_match  # Not a wikilink-converted link, skip
                  if url.startswith('http') or url.startswith('mailto'):
                      return full_match  # External link, skip
                  return f'[{text}]({original_path}.md)'

              # Match markdown links: [text](path) where path looks like it was wikilink-converted
              content = re.sub(r'\[([^\]]+)\]\(([^)]+\.md)\)', fix_md_link, content)

              # Convert wikilinks: [[Page]] → [Page](Page.md)
              def wikilink1(m):
                  page = m.group(1)
                  return f'[{page}]({to_path(page)}.md)'

              def wikilink2(m):
                  page = m.group(1)
                  alias = m.group(2)
                  return f'[{alias}]({to_path(page)}.md)'

              content = re.sub(r'\[\[([^\]|]+)\]\]', wikilink1, content)
              content = re.sub(r'\[\[([^\]|]+)\|([^\]]+)\]\]', wikilink2, content)

              return content

          converted_count = 0
          for folder in os.listdir('.'):
              if not folder.startswith('odoo-'):
                  continue
              if not os.path.isdir(folder):
                  continue

              for root, dirs, files in os.walk(folder):
                  for file in files:
                      if not file.endswith('.md'):
                          continue
                      path = os.path.join(root, file)
                      with open(path, 'r', encoding='utf-8') as f:
                          content = f.read()
                      converted = convert_content(content)
                      if converted != content:
                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(converted)
                          print(f"Converted: {path}")
                          converted_count += 1

          print(f"Total files converted: {converted_count}")
          EOF

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: convert wikilinks to markdown links"
          skip_dirty_check: false
