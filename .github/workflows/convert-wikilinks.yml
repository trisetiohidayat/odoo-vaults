name: Convert Wikilinks to Markdown Links

on:
  push:
    branches:
      - main
    paths:
      - 'odoo-*/**'

jobs:
  convert-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Convert wikilinks using actual file names
        run: |
          python << 'EOF'
          import re
          import os

          # Build a map of all actual files per vault
          # vault_files[vault_name] = {lowercase_filename: actual_relpath}
          vault_files = {}

          for vault_folder in os.listdir('.'):
              if not vault_folder.startswith('odoo-'):
                  continue
              if not os.path.isdir(vault_folder):
                  continue
              vault_files[vault_folder] = {}
              for root, dirs, files in os.walk(vault_folder):
                  for file in files:
                      if not file.endswith('.md'):
                          continue
                      # Path relative to vault folder
                      rel_path = os.path.relpath(os.path.join(root, file), vault_folder)
                      # Key: lowercase relative path (for matching)
                      key = rel_path.replace('\\', '/').lower()
                      vault_files[vault_folder][key] = rel_path

          def find_actual_file(link_text, current_vault, current_file_path=None):
              """Find actual file path from link text within the same vault"""
              files = vault_files.get(current_vault, {})

              # Normalize link text
              link_normalized = link_text.replace("\\", "/").replace(" ", "-").lower()

              # Try exact match (case-insensitive)
              for key, path in files.items():
                  if key.replace("-", "").lower() == link_normalized.replace("-", "").lower():
                      return path

              # Try matching just the filename part
              link_parts = link_normalized.split("/")
              link_filename = link_parts[-1].replace(".md", "")

              for key, path in files.items():
                  key_filename = os.path.basename(key).replace(".md", "").replace("-", " ")
                  if key_filename.lower() == link_filename.replace("-", " "):
                      return path

              return None

          def fix_md_link(m, current_vault):
              full_match = m.group(0)
              text = m.group(1)
              url = m.group(2)

              # Skip external links
              if url.startswith('http') or url.startswith('mailto'):
                  return full_match

              # Skip if URL already points to an existing file in current vault
              url_normalized = url.lower()
              vault_url_map = vault_files.get(current_vault, {})
              if url_normalized in vault_url_map:
                  return full_match

              # Try to fix the URL by finding the actual file
              url_filename = os.path.basename(url).replace('.md', '')
              actual_path = find_actual_file(url_filename.replace("-", " "), current_vault)
              if actual_path:
                  return f'[{text}]({actual_path})'

              return full_match

          def convert_wikilink(m, current_vault):
              page = m.group(1)
              actual_path = find_actual_file(page, current_vault)
              if actual_path:
                  return f'[{page}]({actual_path})'
              return f'[{page}]({page}.md)'

          def convert_wikilink_alias(m, current_vault):
              page = m.group(1)
              alias = m.group(2)
              actual_path = find_actual_file(page, current_vault)
              if actual_path:
                  return f'[{alias}]({actual_path})'
              return f'[{alias}]({page}.md)'

          converted_count = 0
          for vault_folder in os.listdir('.'):
              if not vault_folder.startswith('odoo-'):
                  continue
              if not os.path.isdir(vault_folder):
                  continue

              for root, dirs, files in os.walk(vault_folder):
                  for file in files:
                      if not file.endswith('.md'):
                          continue
                      path = os.path.join(root, file)
                      with open(path, 'r', encoding='utf-8') as f:
                          content = f.read()

                      # Fix markdown links
                      new_content = re.sub(
                          r'\[([^\]]+)\]\(([^)]+\.md)\)',
                          lambda m: fix_md_link(m, vault_folder),
                          content
                      )

                      # Convert wikilinks
                      new_content = re.sub(
                          r'\[\[([^\]|]+)\]\]',
                          lambda m: convert_wikilink(m, vault_folder),
                          new_content
                      )
                      new_content = re.sub(
                          r'\[\[([^\]|]+)\|([^\]]+)\]\]',
                          lambda m: convert_wikilink_alias(m, vault_folder),
                          new_content
                      )

                      if new_content != content:
                          with open(path, 'w', encoding='utf-8') as f:
                              f.write(new_content)
                          print(f"Converted: {path}")
                          converted_count += 1

          print(f"Total files converted: {converted_count}")
          EOF

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: convert wikilinks to markdown links"
          skip_dirty_check: false
